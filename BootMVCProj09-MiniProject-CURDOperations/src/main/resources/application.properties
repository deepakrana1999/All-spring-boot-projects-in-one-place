spring.application.name=BootMVCProj09-MiniProject-CURDOperations


#JDBC properties for dataSource Configuration
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=USER1
spring.datasource.password=USER1
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=100



#JPA-Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


#View Resulverconfiguration
spring.mvc.view.prefix=/WEB-INF/pages/
spring.mvc.view.suffix=.jsp


#Embedded server port no
server.port=4041

#context path
#server.servlet.context-path=project